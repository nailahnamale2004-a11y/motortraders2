<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account | Motor Traders Uganda</title>
  <meta name="description" content="Create or access your Motor Traders Uganda account to post cars, manage listings, save cars, and message sellers privately.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 13h18l-2-5H5l-2 5Z"></path><circle cx="7" cy="18" r="2"></circle><circle cx="17" cy="18" r="2"></circle></svg></span>
        <span>Motor Traders Uganda</span>
      </a>
      <div class="nav-links">
        <a href="index.html">Browse Cars</a>
        <a href="sell.html">Sell a Car</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="help.html">Help Centre</a>
        <a class="active" href="auth.html">Account</a>
      </div>
      <div class="nav-actions">
        <a class="button" href="sell.html">Sell Your Car</a>
      </div>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="panel auth-card" id="authCard">
      <p class="kicker">User accounts</p>
      <h2>Access your dashboard</h2>
      <div class="tabs">
        <button class="active" data-auth-tab="login" type="button">Login</button>
        <button data-auth-tab="register" type="button">Register</button>
        <button data-auth-tab="reset" type="button">Reset</button>
      </div>

      <div class="field full">
        <label for="googleEmail">Google Email</label>
        <input id="googleEmail" type="email" autocomplete="email" placeholder="yourname@gmail.com">
      </div>
      <button class="button-google" id="googleLogin" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09Z"></path>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.99 10.99 0 0 0 12 23Z"></path>
          <path fill="#FBBC05" d="M5.84 14.1A6.6 6.6 0 0 1 5.5 12c0-.73.13-1.43.34-2.1V7.06H2.18A10.99 10.99 0 0 0 1 12c0 1.77.42 3.45 1.18 4.94l3.66-2.84Z"></path>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A10.99 10.99 0 0 0 2.18 7.06L5.84 9.9C6.71 7.3 9.14 5.38 12 5.38Z"></path>
        </svg>
        Continue with Google
      </button>
      <div class="auth-divider">or use email</div>

      <form class="form-grid" id="loginForm" data-auth-form="login">
        <div class="field full">
          <label>Email</label>
          <input name="email" type="email" required placeholder="you@example.com">
        </div>
        <div class="field full">
          <label>Password</label>
          <input name="password" type="password" required placeholder="Password">
        </div>
        <button class="button full" type="submit">Login</button>
      </form>

      <form class="form-grid" id="registerForm" data-auth-form="register" hidden>
        <div class="field full">
          <label>Name</label>
          <input name="name" required placeholder="Full name">
        </div>
        <div class="field full">
          <label>Phone</label>
          <input name="phone" required placeholder="+256">
        </div>
        <div class="field full">
          <label>Email</label>
          <input name="email" type="email" required placeholder="you@example.com">
        </div>
        <div class="field full">
          <label>Password</label>
          <input name="password" type="password" minlength="6" required placeholder="At least 6 characters">
        </div>
        <button class="button full" type="submit">Create Account</button>
      </form>

      <form class="form-grid" id="resetForm" data-auth-form="reset" hidden>
        <div class="field full">
          <label>Email</label>
          <input name="email" type="email" required placeholder="you@example.com">
        </div>
        <button class="button full" type="submit">Send Reset Link</button>
      </form>
    </section>
  </main>

  <a class="whatsapp-float" href="https://wa.me/25678526797?text=Hello%20Motor%20Traders%20Uganda%2C%20I%20need%20help." target="_blank" rel="noopener" aria-label="Chat with Motor Traders Uganda on WhatsApp">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.52 3.49A11.86 11.86 0 0 0 12.06 0C5.49 0 .13 5.35.13 11.93c0 2.1.55 4.16 1.6 5.97L0 24l6.25-1.64a11.9 11.9 0 0 0 5.8 1.48h.01c6.58 0 11.93-5.35 11.94-11.93 0-3.19-1.24-6.19-3.48-8.42Zm-8.46 18.33h-.01a9.88 9.88 0 0 1-5.03-1.38l-.36-.21-3.7.97.99-3.61-.23-.37a9.86 9.86 0 0 1-1.51-5.29c0-5.47 4.46-9.92 9.94-9.92a9.86 9.86 0 0 1 7.02 2.91 9.86 9.86 0 0 1 2.9 7.02c0 5.47-4.46 9.92-9.91 9.92Zm5.45-7.42c-.3-.15-1.77-.87-2.04-.97-.27-.1-.47-.15-.67.15-.2.3-.77.97-.94 1.17-.17.2-.35.22-.65.08-.3-.15-1.26-.46-2.4-1.48-.89-.79-1.49-1.77-1.66-2.07-.17-.3-.02-.46.13-.61.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.61-.92-2.21-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37-.27.3-1.04 1.02-1.04 2.48s1.06 2.87 1.21 3.07c.15.2 2.08 3.18 5.05 4.46.71.31 1.26.49 1.69.63.71.23 1.35.2 1.86.12.57-.09 1.77-.72 2.02-1.42.25-.7.25-1.3.17-1.42-.07-.13-.27-.2-.57-.35Z"></path></svg>
  </a>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
